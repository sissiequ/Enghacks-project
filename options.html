<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CoopSync 设置</title>
  <!-- 引入 PDF.js 库 -->
  <script src="lib/pdf.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; padding: 20px; width: 400px; background-color: #ffffff; color: #333; }
    h2 { font-size: 20px; margin-bottom: 20px; color: #1a1a1a; border-bottom: 2px solid #FFD54F; padding-bottom: 8px; }
    .section { margin-bottom: 30px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: border-color 0.2s; margin-bottom: 10px; }
    input:focus { outline: none; border-color: #FFD54F; box-shadow: 0 0 0 2px rgba(255, 213, 79, 0.2); }
    
    button { width: 100%; padding: 12px; background-color: #1a1a1a; color: #FFD54F; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
    button:hover { background-color: #333; }

    /* 简历上传区样式 */
    #dropZone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 30px 20px;
      text-align: center;
      background: #fafafa;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 15px;
    }
    #dropZone.dragover {
      border-color: #FFD54F;
      background: #fffdf5;
    }
    #dropZone p { margin: 0; color: #666; font-size: 14px; }
    
    #resumeTextPreview {
      width: 100%;
      height: 120px;
      background: #f0f0f0;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      color: #444;
      overflow-y: auto;
      white-space: pre-wrap;
      box-sizing: border-box;
      border: 1px solid #eee;
    }

    .status-msg { margin-top: 10px; font-size: 13px; font-weight: 500; display: none; }
    .hint { font-size: 12px; color: #666; margin-top: 5px; line-height: 1.4; }
  </style>
</head>
<body>
  <h2>CoopSync AI 设置</h2>

  <!-- API 设置部分 -->
  <div class="section">
    <label for="apiKey">OpenRouter API Key:</label>
    <input type="password" id="apiKey" placeholder="sk-or-v1-...">
    <button id="saveApiBtn">保存设置</button>
    <div id="apiStatus" class="status-msg"></div>
    <div class="hint">请填入以 <b>sk-or-v1-</b> 开头的 Key 以支持免费模型。</div>
  </div>

  <!-- 简历上传部分 -->
  <div class="section">
    <label>上传简历 (PDF):</label>
    <div id="dropZone">
      <p>点击或拖拽简历文件至此</p>
      <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
    </div>
    <div id="pdfStatus" class="status-msg" style="color: #0d652d;"></div>
    
    <label style="margin-top: 15px;">简历文本预览:</label>
    <div id="resumeTextPreview">尚未解析简历...</div>
  </div>

  <!-- 额外功能 (可选) -->
  <div class="section" style="border-top: 1px solid #eee; pt: 20px;">
    <button id="exportJobsBtn" style="background: #fff; color: #1a1a1a; border: 1px solid #1a1a1a;">导出已保存职位</button>
    <div id="exportStatus" class="status-msg"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>

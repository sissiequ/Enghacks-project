<!DOCTYPE html>
<html lang="en">
<!-- AI_GENERATED: Frontend UI structure -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Jobs Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="header glass fixed">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                    </div>
                    <h1>Match Jobs</h1>
                </div>

                <div class="header-actions">
                    <button id="scoreJobsBtn" class="score-btn">Score with AI</button>
                    <div class="stats" id="jobStats">
                        Loading jobs...
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div id="loading" class="loading-spinner">
                <div class="spinner"></div>
                <p>Curating your top matches...</p>
            </div>
            
            <div id="noResults" class="no-results hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <h2>No jobs found</h2>
                <p>No job data is available right now.</p>
            </div>

            <div class="job-grid" id="jobGrid">
                <!-- Job cards will be injected here by app.js -->
            </div>
        </main>
        
        <div class="gradient-bg">
            <div class="gradient-blob blob-1"></div>
            <div class="gradient-blob blob-2"></div>
            <div class="gradient-blob blob-3"></div>
        </div>
    </div>

    <!-- Job Card Template -->
    <template id="jobCardTemplate">
        <div class="job-card glass-card">
            <div class="job-card-header">
                <div>
                    <div class="match-badge match-badge-pending">Not scored</div>
                    <h3 class="job-title"></h3>
                    <p class="company-name"></p>
                </div>
            </div>
            
            <div class="job-details">
                <div class="detail-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span class="location"></span>
                </div>
                <div class="detail-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span class="deadline"></span>
                </div>
                <div class="detail-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span class="applicants"></span>
                </div>
            </div>

            <div class="tag-container level-tags"></div>

            <p class="match-reason">Run AI scoring to rank these jobs against your resume.</p>
            
            <div class="card-footer">
                <a href="#" class="view-btn">View on WaterlooWorks</a>
                <div class="posting-id"></div>
            </div>
        </div>
    </template>

    <script src="app_helpers/setScoreButtonState.js"></script>
    <script src="app_helpers/setStats.js"></script>
    <script src="app_helpers/clampScore.js"></script>
    <script src="app_helpers/getScoredCount.js"></script>
    <script src="app_helpers/getLevelTokens.js"></script>
    <script src="app_helpers/getScoreBadgeClass.js"></script>
    <script src="app_helpers/buildScorePayload.js"></script>
    <script src="app_helpers/getMatchMeta.js"></script>
    <script src="app_helpers/getSortedJobs.js"></script>
    <script src="app_helpers/sendRuntimeMessage.js"></script>
    <script src="app_helpers/isJobsPageUrl.js"></script>
    <script src="app_helpers/getWaterlooWorksTab.js"></script>
    <script src="app_helpers/sendMessageWithRetry.js"></script>
    <script src="app_helpers/sendMessageToWaterlooTab.js"></script>
    <script src="app_helpers/openPostingFromDashboard.js"></script>
    <script src="app_helpers/loadJobs.js"></script>
    <script src="app_helpers/handleScoreJobsClick.js"></script>
    <script src="app_helpers/renderJobs.js"></script>
    <script src="app_helpers/initDashboardApp.js"></script>
    <script src="app.js"></script>
</body>
</html>
